
<!DOCTYPE html>
<html>
<head>
    <title>Student Management</title>

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            background: linear-gradient(135deg, #667eea, #764ba2);
            min-height: 100vh;
        }

        header {
            text-align: center;
            color: white;
            padding: 20px;
            font-size: 28px;
            font-weight: 600;
            letter-spacing: 1px;
        }

        .container {
            width: 85%;
            margin: 20px auto;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(12px);
            border-radius: 15px;
            padding: 25px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.2);
        }

        .top-bar {
            display: flex;
            justify-content: space-between;
            margin-bottom: 20px;
            align-items: center;
        }

        input[type="text"] {
            padding: 10px;
            width: 220px;
            border-radius: 8px;
            border: none;
            outline: none;
        }

        button {
            padding: 10px 15px;
            border: none;
            border-radius: 8px;
            background: #00c6ff;
            color: white;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover {
            background: #0072ff;
            transform: scale(1.05);
        }

        .add-btn {
            text-decoration: none;
            padding: 10px 18px;
            background: linear-gradient(45deg, #00c6ff, #0072ff);
            color: white;
            border-radius: 8px;
            transition: 0.3s;
        }

        .add-btn:hover {
            transform: scale(1.08);
        }

        table {
            width: 100%;
            border-collapse: collapse;
            color: white;
            overflow: hidden;
            border-radius: 10px;
        }

        th {
            background: rgba(255,255,255,0.2);
            padding: 12px;
        }

        td {
            padding: 12px;
            text-align: center;
        }

        tr {
            transition: 0.3s;
        }

        tr:hover {
            background: rgba(255,255,255,0.1);
            transform: scale(1.01);
        }

        .action-btn {
            padding: 6px 12px;
            border-radius: 6px;
            text-decoration: none;
            color: white;
            margin: 2px;
            transition: 0.3s;
        }

        .edit {
            background: orange;
        }

        .edit:hover {
            background: darkorange;
        }

        .delete {
            background: #ff4d4d;
        }

        .delete:hover {
            background: #cc0000;
        }

        .search-box {
            display: flex;
            gap: 10px;
        }

        footer {
            text-align: center;
            color: white;
            margin-top: 15px;
            font-size: 14px;
            opacity: 0.8;
        }

    </style>

</head>

<body>

<header>
    🎓 Student Management System
</header>

<div class="container">

    <div class="top-bar">

        <form method="POST" class="search-box">
            <input type="text" name="search" placeholder="🔍 Search student...">
            <button type="submit">Search</button>
        </form>

        <a href="{{ url_for('add') }}" class="add-btn">+ Add Student</a>

    </div>

    <table>
        <tr>
            <th>ID</th>
            <th>Name</th>
            <th>Age</th>
            <th>Course</th>
            <th>Actions</th>
        </tr>

        {% for student in students %}
        <tr>
            <td>{{ student['id'] }}</td>
            <td>{{ student['name'] }}</td>
            <td>{{ student['age'] }}</td>
            <td>{{ student['course'] }}</td>
            <td>
                <a href="{{ url_for('update', id=student['id']) }}" class="action-btn edit">Edit</a>
                <a href="{{ url_for('delete', id=student['id']) }}" class="action-btn delete">Delete</a>
            </td>
        </tr>
        {% endfor %}

    </table>

</div>


</body>
</html>
